<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Frozen lake blizzard favicon</title>
  <desc id="desc">A circular dark frozen-lake icon with icy blue glow and falling snow on a transparent background.</desc>
  <defs>
    <radialGradient id="lakeBase" cx="35%" cy="24%" r="76%">
      <stop offset="0%" stop-color="#14364a" />
      <stop offset="42%" stop-color="#071421" />
      <stop offset="100%" stop-color="#02060a" />
    </radialGradient>
    <radialGradient id="frostGlow" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#d9f5ff" stop-opacity="0.96" />
      <stop offset="33%" stop-color="#87dbff" stop-opacity="0.56" />
      <stop offset="76%" stop-color="#1f6b8d" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#1f6b8d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="lakeSheen" cx="50%" cy="70%" r="56%">
      <stop offset="0%" stop-color="#87dbff" stop-opacity="0.48" />
      <stop offset="48%" stop-color="#1f6b8d" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#102f42" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="rim" x1="136" x2="376" y1="72" y2="440">
      <stop offset="0%" stop-color="#f3fbff" />
      <stop offset="42%" stop-color="#87dbff" />
      <stop offset="100%" stop-color="#24485c" />
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="224" />
    </clipPath>
  </defs>
  <circle cx="256" cy="256" r="235" fill="url(#rim)" opacity="0.95" />
  <circle cx="256" cy="256" r="224" fill="url(#lakeBase)" />
  <g clip-path="url(#circleClip)">
    <circle cx="206" cy="148" r="158" fill="url(#frostGlow)" filter="url(#softBlur)" />
    <ellipse cx="292" cy="342" rx="210" ry="116" fill="url(#lakeSheen)" filter="url(#softBlur)" />
    <ellipse cx="252" cy="324" rx="156" ry="54" fill="#d9f5ff" opacity="0.1" />
    <ellipse cx="250" cy="348" rx="202" ry="72" fill="#87dbff" opacity="0.14" />
